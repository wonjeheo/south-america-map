<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';

  script-src
    'self'
    https://unpkg.com
    https://www.gstatic.com
    https://apis.google.com;

  style-src
    'self'
    'unsafe-inline'
    https://unpkg.com
    https://accounts.google.com;

  img-src
    'self'
    data:
    https://unpkg.com
    https://tile.openstreetmap.org
    https://*.tile.openstreetmap.org
    https://*.googleusercontent.com;

  connect-src
    'self'
    https://unpkg.com
    https://www.gstatic.com
    https://apis.google.com
    https://accounts.google.com
    https://*.googleapis.com
    https://*.firebaseio.com
    wss://*.firebaseio.com
    https://*.firebaseapp.com;

  frame-src
    https://*.firebaseapp.com
    https://accounts.google.com
    https://apis.google.com;

  object-src 'none';
  base-uri 'self';
  form-action 'self';
  upgrade-insecure-requests;
">
  <title>South America Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body class="locked-mode">
  <div id="login-overlay" class="login-screen">
    <div class="login-box">
      <p class="eyebrow">SOUTH AMERICA TRAVEL LOG</p>
      <h1>남미 여행 지도 ✈️</h1>
      <p>
        게스트에게는 여행이 끝난 뒤 공개한 도시·월 단위 일정·이동 경로만 표시됩니다.
        숙소, 정확한 날짜, 비용과 메모는 관리자에게만 보입니다.
      </p>
      <button id="btn-login-google" class="btn-login" type="button">Google 로그인 (관리자)</button>
      <button id="btn-guest" class="btn-guest" type="button">공개 지도 보기 (게스트)</button>
    </div>
  </div>

  <button id="btn-session" class="floating-session hidden" type="button">관리자 로그인</button>

  <main>
    <div id="map" aria-label="남미 여행 경로 지도"></div>

    <div id="privacy-notice" class="privacy-notice">
      여행이 종료된 뒤 공개한 요약 지도입니다.
    </div>

    <div id="total-spent-box" class="admin-only">
      총 사용 금액: <span id="total-spent">0</span>원
    </div>

    <aside id="timeline-panel">
      <h2 id="timeline-title">여행 타임라인</h2>
      <p id="timeline-empty" class="timeline-empty">여행 데이터를 불러오는 중입니다.</p>
      <div id="timeline-box"></div>
    </aside>

    <div id="admin-publish-panel" class="admin-only publish-panel">
      <button id="btn-publish" type="button">공개 지도 갱신</button>
      <p id="publish-status" aria-live="polite"></p>
    </div>

    <div id="map-buttons" class="button-panel">
      <button id="add-city-mobile" class="admin-only" type="button">도시 추가</button>
      <button id="btn-world" type="button">전체 보기</button>
      <button id="btn-southamerica" type="button">남미 확대</button>
    </div>

    <div id="clock-box">
      <span id="time-korea">🇰🇷 00:00</span>
      <span class="divider">|</span>
      <span id="time-local">🌎 00:00</span>
    </div>
  </main>

  <div id="add-city-overlay" class="hidden" aria-hidden="true">
    <div class="overlay-text">지도에서 도시 위치를 선택하세요</div>
  </div>

  <div id="modal-city" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-city-title">
    <div class="modal-content">
      <h2 id="modal-city-title">도시 정보</h2>

      <section class="public-summary">
        <strong id="city-public-name">도시</strong>
        <span id="city-public-period">방문 시기</span>
      </section>

      <div class="admin-detail">
        <label for="city-name">도시 이름</label>
        <input id="city-name" type="text" maxlength="100" autocomplete="off">

        <label for="city-in">DATE IN</label>
        <input id="city-in" type="date">

        <label for="city-out">DATE OUT</label>
        <input id="city-out" type="date">

        <label for="city-hotel">HOTEL</label>
        <input id="city-hotel" type="text" maxlength="200" autocomplete="off">

        <h3>지출 내역</h3>
        <div id="spent-list"></div>
        <button id="add-spent-item" type="button">지출 항목 추가</button>

        <div id="city-spent-total">도시 지출 총합: 0원</div>

        <div class="modal-actions">
          <button id="city-save" type="button">저장</button>
          <button id="city-connect" type="button">연결하기</button>
          <button id="city-delete" class="danger" type="button">삭제</button>
        </div>
      </div>

      <button id="city-cancel" type="button">닫기</button>
    </div>
  </div>

  <div id="modal-route" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-route-title">
    <div class="modal-content">
      <h2 id="modal-route-title">노선 정보</h2>

      <section class="public-summary">
        <strong id="route-public-path">출발지 → 도착지</strong>
        <span id="route-public-transport">이동수단</span>
      </section>

      <div class="admin-detail">
        <label for="route-transport">이동수단</label>
        <select id="route-transport">
          <option value="비행기">비행기</option>
          <option value="버스">버스</option>
          <option value="야간버스">야간버스</option>
          <option value="기차">기차</option>
        </select>

        <label for="route-cost">비용</label>
        <input id="route-cost" type="number" min="0" max="100000000" step="1">

        <label for="route-note">메모</label>
        <input id="route-note" type="text" maxlength="300" autocomplete="off">

        <div class="modal-actions">
          <button id="route-save" type="button">저장</button>
          <button id="route-delete" class="danger" type="button">삭제</button>
        </div>
      </div>

      <button id="route-cancel" type="button">닫기</button>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
